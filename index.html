<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Live Test Rig</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: #fff;
            padding: 20px;
        }
        #log {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            height: 300px;
            overflow-y: scroll;
        }
        .status-on{
            color: #00ff00;
        }
        .status-off{
            color: #ff0000;
        }
    </style>
</head>
<body>
    <h1>WebSocket Broadcast Console</h1>
    <p id="status" class="status-off">Connecting...</p>

    <form id="message-form"  action="">
        <input id="message-input" type="text" placeholder="Send a message to all clients" required />
        <button type="submit">Send</button>
    </form>

    <h3>Live Stream Logs:</h3>
    <pre id="log"></pre>
</body>

<script>

    const statusEL = document.getElementById('status');
    const logEL = document.getElementById('log');
    const input = document.getElementById('message-input');

    // 1. Initiate the Handshake
    const socket = new WebSocket('ws://localhost:9090');

    const appendLog = (label, message) => {
        const entry = `${new Date().toLocaleTimeString()} ${label}: ${message}\n `;
        log.textContent = entry + log.textContent;
    }

    socket.addEventListener('open', () => {
        statusEL.textContent = 'Connected';
        statusEL.className = 'status-on';
        appendLog('[SYSTEM]','Connected to WebSocket server');
    })

    socket.addEventListener('close', () => {
        statusEL.textContent = 'Disconnected';
        statusEL.className = 'status-off';
        appendLog('[SYSTEM]','Disconnected from WebSocket server');
    })
    
    socket.addEventListener('message', (event) => {
        appendLog('📥 Received: ', event.data);
    })

    document.getElementById('message-form').addEventListener('submit', (e) => {
        e.preventDefault();

        if(socket.readyState !== WebSocket.OPEN){
            appendLog('[ERROR]', 'Cannot send message, socket not open');
        }

        const message = input.value.trim();
            socket.send(message);
            appendLog('[Sent]: ' , message);
            input.value = '';
    })
    
</script>

</html>
